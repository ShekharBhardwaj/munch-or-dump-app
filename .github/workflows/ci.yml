name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege — this job only reads the repo (checkout, pub get, analyze, test).
permissions:
  contents: read

jobs:
  analyze-and-test:
    name: Format · Analyze · Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Format-check runs before codegen so it only inspects hand-written source.
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Generate code
        run: dart run build_runner build

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

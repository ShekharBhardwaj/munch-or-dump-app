name: Deploy to TestFlight

# Ships to TestFlight when:
#   - pubspec.yaml is changed on main (bump the version = ship), or
#   - a v* tag is pushed, or
#   - triggered manually from the Actions tab.
# Build number = workflow run number + 100 (always ascending; no local bumps needed).
#
# Secrets (repo settings):
#   ASC_KEY_ID, ASC_ISSUER_ID, ASC_KEY_P8 — App Store Connect API key (App Manager role).
#   DIST_CERT_P12 (base64 of the Apple Distribution .p12), DIST_CERT_PASSWORD.
# Apple won't let an API key create a *distribution* certificate on the fly, so we
# ship a pre-made one via DIST_CERT_P12 and import it into a throwaway keychain.
# The API key still auto-manages the provisioning profile (that part is permitted).

on:
  push:
    branches: [main]
    paths: [pubspec.yaml]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: deploy-testflight
  cancel-in-progress: false

jobs:
  testflight:
    name: Build · Sign · Upload
    # macOS 26 image ships Xcode 26 / iOS 26 SDK — Apple now rejects uploads built
    # with anything older (iOS 18.5 SDK on macos-15 fails validation with a 409).
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer 2>/dev/null || sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)/Contents/Developer"

      - name: Show build environment
        run: xcodebuild -version && xcrun --sdk iphoneos --show-sdk-version

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install App Store Connect API key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "$ASC_KEY_P8" > ~/.appstoreconnect/private_keys/AuthKey_"$ASC_KEY_ID".p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_"$ASC_KEY_ID".p8

      - name: Import Apple Distribution certificate
        env:
          DIST_CERT_P12: ${{ secrets.DIST_CERT_P12 }}
          DIST_CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(uuidgen)
          echo "$DIST_CERT_P12" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/dist.p12" -k "$KEYCHAIN" -P "$DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          # Make the temp keychain searchable alongside the default one.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/dist.p12"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Install App Store provisioning profile
        env:
          PROVISIONING_PROFILE_B64: ${{ secrets.PROVISIONING_PROFILE_B64 }}
        run: |
          PROFILES=~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PROFILES"
          echo "$PROVISIONING_PROFILE_B64" | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"
          UUID=$(security cms -D -i "$RUNNER_TEMP/profile.mobileprovision" | plutil -extract UUID raw -)
          cp "$RUNNER_TEMP/profile.mobileprovision" "$PROFILES/$UUID.mobileprovision"
          echo "Installed profile UUID: $UUID"

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build archive (manual signing)
        run: |
          BUILD_NUMBER=$(( ${{ github.run_number }} + 100 ))
          echo "Build number: $BUILD_NUMBER"
          # This app uses Swift Package Manager, not CocoaPods — no `pod install`.
          flutter build ios --config-only --release \
            --dart-define-from-file=dart_defines.json \
            --build-number="$BUILD_NUMBER"
          # Manual signing config lives in the Runner target's Release build settings
          # (project.pbxproj) so it applies ONLY to the app — passing it on the command
          # line would wrongly force it onto every SPM dependency, which reject profiles.
          xcodebuild archive \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/ios/archive/Runner.xcarchive
          test -d build/ios/archive/Runner.xcarchive

      - name: Export signed IPA (manual signing)
        run: |
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>method</key>
          	<string>app-store-connect</string>
          	<key>signingStyle</key>
          	<string>manual</string>
          	<key>teamID</key>
          	<string>66BV6SH279</string>
          	<key>signingCertificate</key>
          	<string>Apple Distribution</string>
          	<key>provisioningProfiles</key>
          	<dict>
          		<key>com.munchordump.app</key>
          		<string>Munch or Dump App Store</string>
          	</dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist build/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun altool --upload-app --type ios \
            -f build/ios/ipa/*.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

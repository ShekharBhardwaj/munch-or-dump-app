name: munch_or_dump
description: "Munch or Dump — scan a product, get a verdict. iOS + Android client for the Munch or Dump API."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^10.3.1
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  google_sign_in: ^7.2.0
  image_picker: ^1.2.2
  json_annotation: ^4.12.0
  mobile_scanner: ^7.2.0
  share_plus: ^13.2.0
  shared_preferences: ^2.5.5

dev_dependencies:
  build_runner: ^2.15.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.14.0

flutter:
  uses-material-design: true
